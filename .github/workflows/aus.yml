name: AUS

on:
  schedule:
    - cron: "10 * * * *"
  workflow_dispatch:

# 🔥 prevent overlapping runs
concurrency:
  group: aus-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        scraper: [VillageCinemas, EventCinemas, Hoyts, imax, hoytnz, eventnz]

    env:
      REPO: cinenationbo/aus

    steps:
      # 🔒 Clone PRIVATE repo
      - name: Clone Private Repo
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git

      # 🐍 Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ⚡ Cache pip
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('aus/requirements.txt') }}

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          cd aus
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      # 🎬 Run scraper
      - name: Run scraper
        run: |
          cd aus
          SCRIPT="${{ matrix.scraper }}.py"

          echo "🎬 Running $SCRIPT"

          for i in {1..6}; do
            echo "Attempt $i"

            if python $SCRIPT; then
              echo "✅ $SCRIPT finished successfully"
              break
            fi

            echo "❌ $SCRIPT failed. Retrying in 10 seconds..."
            sleep 10
          done

      # 💾 Commit & Push
      - name: Commit scraper data
        run: |
          cd aus
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ nz/

          git commit -m "[skip ci] ${{ matrix.scraper }} update ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))" || echo "No changes"

          sleep $((RANDOM % 10))

          for i in {1..5}; do
            echo "Push attempt $i"

            git pull --rebase origin main || true

            if git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git; then
              echo "✅ Push succeeded"
              break
            fi

            echo "❌ Push failed. Retrying in 5 seconds..."
            sleep 5
          done


  merge:
    needs: scrape
    runs-on: ubuntu-latest

    env:
      REPO: cinenationbo/aus

    steps:
      # 🔒 Clone PRIVATE repo
      - name: Clone Private Repo
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git

      # 🔄 Ensure latest repo
      - name: Ensure latest repo
        run: |
          cd aus
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for i in {1..5}; do
            echo "Pull attempt $i"

            if git pull --rebase origin main; then
              echo "✅ Repo updated"
              break
            fi

            echo "Retrying pull..."
            sleep 3
          done

      # 🐍 Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ⚡ Cache pip
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('aus/requirements.txt') }}

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          cd aus
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      # 🔀 Run merger
      - name: Run merger
        run: |
          cd aus
          echo "🔀 Running merger..."

          for i in {1..5}; do
            echo "Attempt $i"

            if python merger.py; then
              echo "✅ Merger finished"
              break
            fi

            echo "❌ Merger failed. Retrying..."
            sleep 10
          done

      # 💾 Commit merged data
      - name: Commit merged data
        run: |
          cd aus
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ nz/

          git commit -m "Merged cinema data ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))" || echo "No changes"

          sleep $((RANDOM % 10))

          for i in {1..5}; do
            echo "Push attempt $i"

            git pull --rebase origin main || true

            if git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git; then
              echo "✅ Push succeeded"
              break
            fi

            echo "❌ Push failed. Retrying in 5 seconds..."
            sleep 5
          done
