name: OCEANIA

on:
  workflow_dispatch:

# 🔥 prevent overlapping runs
concurrency:
  group: oceania-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        mode: [daily, advance]

    env:
      REPO: cinenationbo/aus

    steps:
      # 🔒 Clone PRIVATE repo
      - name: Clone Private Repo
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git

      # 🐍 Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          cd aus
          python -m pip install --upgrade pip
          pip install requests cloudscraper playwright

      # 💾 Cache Playwright browsers
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('aus/australia/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # 📥 Install Playwright Chromium
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium

      # 🎬 Run Scrapers
      - name: Run Scrapers
        run: |
          cd aus
          MODE="${{ matrix.mode }}"

          # Run Australia
          if [ -d australia ]; then
            echo "🎬 Running Australia scraper in mode $MODE"
            cd australia
            for i in {1..6}; do
              echo "Australia Attempt $i"
              if python australia.py --mode "$MODE"; then
                echo "✅ Australia finished successfully"
                break
              fi
              echo "❌ Australia failed. Retrying..."
              sleep 10
            done
            cd ..
          fi

          # Run New Zealand
          if [ -d nz ]; then
            echo "🎬 Running New Zealand scraper in mode $MODE"
            cd nz
            for i in {1..6}; do
              echo "New Zealand Attempt $i"
              if python nz.py --mode "$MODE"; then
                echo "✅ New Zealand finished successfully"
                break
              fi
              echo "❌ New Zealand failed. Retrying..."
              sleep 10
            done
            cd ..
          fi

      # 💾 Commit & Push
      - name: Commit scraper data
        run: |
          cd aus
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Add both data paths
          git add australia/data/ || true
          git add nz/data/ || true

          git commit -m "[skip ci] ${{ matrix.mode }} update ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))" || echo "No changes"

          sleep $((RANDOM % 10))

          for i in {1..5}; do
            echo "Push attempt $i"

            git pull --rebase origin main || true

            if git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git; then
              echo "✅ Push succeeded"
              break
            fi

            echo "❌ Push failed. Retrying in 5 seconds..."
            sleep 5
          done
