name: Peddi USA

on:
  workflow_dispatch:

# 🔥 prevent overlapping runs
concurrency:
  group: peddi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        shard: [0,1]

    env:
      MOVIE_ID: "244813"
      RELEASE_DATE: "2026-06-03"
      REPO: cinenationbo/usa

    steps:
      # ✅ Setup Python (no cache yet)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 🔥 Clone PRIVATE repo
      - name: Clone Private Repo
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git
      
      # ⚡ Enable pip cache AFTER clone
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('usa/requirements.txt') }}

      # ⚡ Install dependencies
      - name: Install dependencies
        run: |
          cd usa
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      # 📅 Compute TARGET_DATE (shifts to the next day after 12:00 PM PST)
      - name: Compute TARGET_DATE
        run: |
          # Get current date and hour in America/Los_Angeles timezone
          PST_DATE=$(TZ="America/Los_Angeles" date +"%Y-%m-%d")
          PST_HOUR=$(TZ="America/Los_Angeles" date +"%H" | sed 's/^0//') # strip leading zero
          
          # Default hour to 0 if empty
          if [ -z "$PST_HOUR" ]; then
            PST_HOUR=0
          fi
          
          BASE_DATE=$PST_DATE
          
          # If PST time is 12:00 PM (noon) or later, shift base date to the next day
          if [ "$PST_HOUR" -ge 12 ]; then
            BASE_DATE=$(date -d "$PST_DATE + 1 day" +"%Y-%m-%d")
          fi
          
          # Ensure base date is not before release date
          if [[ "$BASE_DATE" < "$RELEASE_DATE" ]]; then
            BASE_DATE=$RELEASE_DATE
          fi
          
          # Add shard offset (0 or 1 days)
          TARGET_DATE=$(date -d "$BASE_DATE +${{ matrix.shard }} day" +"%Y-%m-%d")
          echo "TARGET_DATE=$TARGET_DATE" >> $GITHUB_ENV
          echo "📅 TARGET_DATE=$TARGET_DATE"
          
      # 🎬 Run scraper
      - name: Run scraper
        run: |
          cd usa
          echo "🎬 MOVIE_ID=$MOVIE_ID"
          echo "📅 TARGET_DATE=$TARGET_DATE"
          python usa.py
          
      # 🚀 Commit & Push back to PRIVATE repo
      - name: Commit & Push
        run: |
          cd usa
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain data/) ]]; then
            git add data/
            git commit -m "[skip ci] shard ${{ matrix.shard }} $TARGET_DATE ($(date -u +'%H:%M:%S'))"
            # retry loop
            for i in {1..5}; do
              echo "🔁 Push attempt $i..."
              git pull --rebase origin main && \
              git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git && break
              echo "⚠️ Retry in $((i*5))s..."
              sleep $((i*5))
            done
            echo "✅ Changes pushed"
          else
            echo "🟡 No changes"
          fi
          
  combine:
    needs: scrape
    runs-on: ubuntu-latest

    env:
      REPO: cinenationbo/usa
      MOVIE_ID: "244813"
    steps:
      # ✅ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 🔥 Clone PRIVATE repo again (fresh latest)
      - name: Clone Private Repo
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git
          
      # ⚡ Cache pip
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('usa/requirements.txt') }}

      # ⚡ Install deps
      - name: Install dependencies
        run: |
          cd usa
          pip install -r requirements.txt
      
      # 📊 Run combiner
      - name: Run combiner
        run: |
          cd usa
          echo "📊 Combining data..."
          python combiner.py
          
      # 🚀 Commit combined output
      - name: Commit & Push Combined
        run: |
          cd usa
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain data/) ]]; then
            git add data/
            git commit -m "combined $(date -u +'%Y-%m-%d %H:%M:%S')"
            # retry loop
            for i in {1..5}; do
              echo "🔁 Push attempt $i..."
              git pull --rebase origin main && \
              git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git && break
              echo "⚠️ Retry in $((i*5))s..."
              sleep $((i*5))
            done
            echo "✅ Combined pushed"
          else
            echo "🟡 No changes"
          fi
