name: OCEANIA TARGET DATE

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: oceania-target-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    strategy:
      fail-fast: false
      matrix:
        include:
          - date: "20260724"
          - date: "20260725"

    env:
      REPO: cinenationbo/aus

    steps:
      # Clone private repo
      - name: Clone Private Repo
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install dependencies
      - name: Install dependencies
        run: |
          cd aus
          python -m pip install --upgrade pip
          pip install requests aiohttp aiohttp_retry tqdm cloudscraper tabulate playwright pytz

      # Cache Playwright browsers
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright
          restore-keys: |
            ${{ runner.os }}-playwright

      # Install Playwright Chromium
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium

      # Run Scrapers
      - name: Run Scrapers
        run: |
          cd aus

          DATE="${{ matrix.date }}"
          MODE="advance"

          echo "=================================="
          echo "DATE : $DATE"
          echo "MODE : $MODE"
          echo "=================================="

          # Australia scraper
          if [ -f aus.py ]; then
            SCRAPER_SCRIPT="aus.py"
          elif [ -f austrila.py ]; then
            SCRAPER_SCRIPT="austrila.py"
          else
            echo "Australia scraper not found!"
            exit 1
          fi

          echo "Running Australia..."

          for i in {1..6}; do
            echo "Attempt $i"
            if python "$SCRAPER_SCRIPT" \
              --mode "$MODE" \
              --date "$DATE"; then
              echo "Australia completed."
              break
            fi

            echo "Retrying in 10 seconds..."
            sleep 10
          done

          # New Zealand scraper
          if [ -f nz.py ]; then
            echo "Running New Zealand..."

            for i in {1..6}; do
              echo "Attempt $i"
              if python nz.py \
                --mode "$MODE" \
                --date "$DATE"; then
                echo "New Zealand completed."
                break
              fi

              echo "Retrying in 10 seconds..."
              sleep 10
            done
          fi

      # Commit & Push
      - name: Commit scraper data
        run: |
          cd aus

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/ || true

          git commit -m "Advance ${{ matrix.date }} ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))" || echo "No changes"

          sleep $((RANDOM % 10))

          for i in {1..5}; do
            echo "Push attempt $i"

            git pull --rebase origin main || true

            if git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git; then
              echo "✅ Push succeeded"
              break
            fi

            echo "❌ Push failed. Retrying in 5 seconds..."
            sleep 5
          done
