name: Canada Scraper Schedule

on:
  schedule:
    - cron: '20 * * * *'
  workflow_dispatch:

jobs:
  run_scraper:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # don't cancel other jobs if one fails
      matrix:
        day: [today, tomorrow]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install

      # ✅ Set Toronto-based date
      - name: Set Date
        run: |
          if [ "${{ matrix.day }}" = "today" ]; then
            DATE=$(TZ="America/Toronto" date +"%Y-%m-%d")
          else
            DATE=$(TZ="America/Toronto" date -d "+1 day" +"%Y-%m-%d")
          fi
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "Running for $DATE"

      # 🔁 Retry logic (3 attempts)
      - name: Run Scraper with Retry
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            python scraper.py $DATE && break || sleep 10
          done

      # ✅ Upload output (optional but useful)
      - name: Upload Output
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ matrix.day }}
          path: |
            *.json
            *.log

      # 🚀 Commit & Push (safe)
      - name: Commit & Push Results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update scraper data for $DATE"
            git pull --rebase
            git push
          fi
