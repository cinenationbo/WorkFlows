name: Canada Scraper Schedule

on:
  schedule:
    # ⏱ Every 1 hr at 20 minutes (fixed)
    - cron: "20 * * * *"
  workflow_dispatch:

# 🔥 Prevent overlapping runs
concurrency:
  group: canada-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      REPO: cinenationbo/usa   # same repo
      CINEPLEX_FILM_ID: "60740"
      ATP: "15.0"
      TAX_RATE: "0.13"

    steps:
      # 🐍 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 🔐 Clone PRIVATE repo
      - name: Clone Private Repo
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git

      # ⚡ Cache pip
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          cd usa
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🎭 Install Playwright
      - name: Install Playwright
        run: |
          cd usa
          playwright install
          playwright install-deps

      # 🚀 Run scraper
      - name: Run canada.py
        run: |
          cd usa
          echo "🎬 FILM_ID=$CINEPLEX_FILM_ID"
          python canada.py

      # 📤 Commit & Push (exclude USA data)
      - name: Commit & Push
        run: |
          cd usa
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          # ❌ Exclude USA data folder
          git reset data/244813/

          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "[skip ci] canada update $(date -u +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git
            echo "✅ Changes pushed"
          else
            echo "🟡 No changes"
          fi
