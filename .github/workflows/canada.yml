name: Canada Scraper Schedule

on:
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch:

# 🔥 Prevent overlapping runs
concurrency:
  group: canada-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        day: [today, tomorrow]

    env:
      REPO: cinenationbo/usa
      CINEPLEX_FILM_ID: "60740"
      ATP: "15.0"
      TAX_RATE: "0.13"
      TZ: America/Toronto

    steps:
      # 📥 Checkout private repo
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          token: ${{ secrets.GH_PAT }}
          path: usa
          fetch-depth: 1

      # 🐍 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: usa/requirements.txt

      # 📦 Install dependencies
      - name: Install dependencies
        working-directory: usa
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🎭 Install Playwright + xvfb
      - name: Install Playwright
        working-directory: usa
        run: |
          playwright install chromium
          sudo apt-get update
          sudo apt-get install -y xvfb

      # 📅 Set target date
      - name: Set Date
        shell: bash
        run: |
          if [[ "${{ matrix.day }}" == "today" ]]; then
            DATE=$(TZ=$TZ date +"%Y-%m-%d")
          else
            DATE=$(TZ=$TZ date -d "+1 day" +"%Y-%m-%d")
          fi

          echo "DATE=$DATE" >> $GITHUB_ENV

          echo "================================"
          echo "📅 DATE=$DATE"
          echo "🎬 FILM_ID=$CINEPLEX_FILM_ID"
          echo "================================"

      # 🚀 Run scraper with retry
      - name: Run canada.py
        working-directory: usa
        shell: bash
        run: |
          success=0

          for i in 1 2 3; do
            echo "🔁 Attempt $i"

            xvfb-run -a python canada.py "$DATE"

            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              success=1
              echo "✅ Scraper success"
              break
            fi

            echo "⚠️ Failed attempt $i"
            sleep 20
          done

          if [ $success -ne 1 ]; then
            echo "❌ All retries failed"
            exit 1
          fi

      # 📤 Commit & Push
      - name: Commit & Push
        working-directory: usa
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          # ❌ Exclude unwanted USA folder
          git reset data/244813/ || true

          if [[ -n $(git status --porcelain) ]]; then

            git commit -m "canada update $DATE ($(date -u +'%H:%M:%S UTC'))"

            for i in 1 2 3 4 5; do
              echo "🚀 Push attempt $i"

              git pull --rebase origin main

              if git push; then
                echo "✅ Push successful"
                exit 0
              fi

              echo "⚠️ Push failed. Retrying..."
              sleep $((i * 10))
            done

            echo "❌ Push failed after retries"
            exit 1

          else
            echo "🟡 No changes detected"
          fi
