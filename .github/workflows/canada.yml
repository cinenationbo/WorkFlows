name: Canada Daily and advance

on:
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch:

concurrency:
  group: canada-target-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        shard: [today, tomorrow]

    env:
      REPO: cinenationbo/usa
      CINEPLEX_FILM_ID: "60740"
      ATP: "15.0"
      TAX_RATE: "0.13"
      TZ: America/Toronto

    steps:
      # 📥 Checkout repo
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO }}
          token: ${{ secrets.GH_PAT }}
          path: usa
          fetch-depth: 1

      # 🐍 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: usa/requirements.txt

      # 📦 Install dependencies
      - name: Install dependencies
        working-directory: usa
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🎭 Install Playwright
      - name: Install Playwright
        working-directory: usa
        run: |
          playwright install chromium
          sudo apt-get update
          sudo apt-get install -y xvfb

      # 📅 Set Canada Target Date
      - name: Set Target Date
        run: |
          if [ "${{ matrix.shard }}" = "today" ]; then
            echo "TARGET_DATE=$(TZ=$TZ date +%Y%m%d)" >> $GITHUB_ENV
          else
            echo "TARGET_DATE=$(TZ=$TZ date -d '+1 day' +%Y%m%d)" >> $GITHUB_ENV
          fi

      # 📅 Debug
      - name: Show Config
        run: |
          echo "Shard      : ${{ matrix.shard }}"
          echo "Film ID    : $CINEPLEX_FILM_ID"
          echo "Target Date: $TARGET_DATE"

      # 🚀 Run scraper with retries
      - name: Run canada.py
        working-directory: usa
        run: |
          success=0

          for i in {1..3}; do
            echo "===================================="
            echo "Shard   : ${{ matrix.shard }}"
            echo "Attempt : $i"
            echo "Date    : $TARGET_DATE"
            echo "===================================="

            if xvfb-run -a python canada.py "$TARGET_DATE"; then
              success=1
              echo "✅ Success"
              break
            fi

            echo "⚠️ Attempt $i failed"

            if [ "$i" -lt 3 ]; then
              sleep 20
            fi
          done

          if [ "$success" -ne 1 ]; then
            echo "❌ Scraper failed after 3 attempts"
            exit 1
          fi

      # 📤 Commit & Push with retries
      - name: Commit & Push
        working-directory: usa
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          # Exclude unwanted folder
          git reset data/244813/ || true

          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "canada ${{ matrix.shard }} $TARGET_DATE ($(TZ=$TZ date +'%H:%M:%S %Z'))"

            pushed=0

            for i in {1..5}; do
              echo "🚀 Push attempt $i"

              if git pull --rebase origin main && git push; then
                pushed=1
                echo "✅ Push successful"
                break
              fi

              echo "⚠️ Push failed"

              if [ "$i" -lt 5 ]; then
                sleep $((i * 10))
              fi
            done

            if [ "$pushed" -ne 1 ]; then
              echo "❌ Failed to push after 5 attempts"
              exit 1
            fi
          else
            echo "🟡 No changes detected"
          fi
