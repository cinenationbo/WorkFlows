name: Canada Scraper Schedule

on:
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch:

# 🔥 Prevent overlapping runs
concurrency:
  group: canada-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        day: [today, tomorrow]

    env:
      REPO: cinenationbo/usa
      CINEPLEX_FILM_ID: "60740"
      ATP: "15.0"
      TAX_RATE: "0.13"

    steps:
      # 🐍 Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 🔐 Clone PRIVATE repo
      - name: Clone Private Repo
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git

      # ⚡ Cache pip (fixed path)
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('usa/requirements.txt') }}

      # 📦 Install dependencies
      - name: Install dependencies
        working-directory: usa
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 🎭 Install Playwright
      - name: Install Playwright
        working-directory: usa
        run: |
          playwright install
          playwright install-deps

      # 📅 Set Date (Toronto)
      - name: Set Date
        run: |
          if [ "${{ matrix.day }}" = "today" ]; then
            DATE=$(TZ="America/Toronto" date +"%Y-%m-%d")
          else
            DATE=$(TZ="America/Toronto" date -d "+1 day" +"%Y-%m-%d")
          fi
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "📅 Running for $DATE"

      # 🔁 Run scraper with retry
      - name: Run canada.py
        working-directory: usa
        run: |
          echo "🎬 FILM_ID=$CINEPLEX_FILM_ID"

          for i in 1 2 3; do
            echo "Attempt $i..."
            python canada.py $DATE && break || sleep 15
          done

      # 📤 Commit & Push (safe + conflict handled)
      - name: Commit & Push
        working-directory: usa
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          # ❌ Exclude USA data folder
          git reset data/244813/ || true

          if [[ -n $(git status --porcelain) ]]; then
            git commit -m "canada update $DATE ($(date -u +'%H:%M:%S'))"
            
            # 🔥 Handle parallel push conflicts
            git pull --rebase origin main || true
            
            git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git
            echo "✅ Changes pushed"
          else
            echo "🟡 No changes"
          fi
