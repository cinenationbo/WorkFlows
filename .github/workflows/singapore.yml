name: SINGAPORE

on:
  workflow_dispatch:

# 🔥 prevent overlapping runs
concurrency:
  group: singapore-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        mode: [daily, advance]

    env:
      REPO: cinenationbo/singapore

    steps:
      # 🔒 Clone PRIVATE repo
      - name: Clone Private Repo
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git

      # 🐍 Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          cd singapore
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests playwright
          fi

      # 💾 Cache Playwright browsers
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('singapore/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # 📥 Install Playwright Chromium
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: python -m playwright install chromium

      # 🎬 Run scraper
      - name: Run scraper
        run: |
          cd singapore
          MODE="${{ matrix.mode }}"

          echo "🎬 Running singapore.py with mode $MODE"

          for i in {1..6}; do
            echo "Attempt $i"

            if python singapore.py --mode "$MODE"; then
              echo "✅ Scraper finished successfully"
              break
            fi

            echo "❌ Scraper failed. Retrying in 10 seconds..."
            sleep 10
          done

      # 💾 Commit & Push
      - name: Commit scraper data
        run: |
          cd singapore
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/

          git commit -m "${{ matrix.mode }} update ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))" || echo "No changes"

          sleep $((RANDOM % 10))

          for i in {1..5}; do
            echo "Push attempt $i"

            git pull --rebase origin main || true

            if git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git; then
              echo "✅ Push succeeded"
              break
            fi

            echo "❌ Push failed. Retrying in 5 seconds..."
            sleep 5
          done
