name: NEPAL

on:
  workflow_dispatch:

# 🔥 prevent overlapping runs
concurrency:
  group: nepal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        scraper: [advance, daily]

    env:
      REPO: cinenationbo/nepal

    steps:
      # 🔒 Clone PRIVATE repo
      - name: Clone Private Repo
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git

      # 🐍 Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 📦 Install dependencies
      - name: Install dependencies
        run: |
          cd nepal
          python -m pip install --upgrade pip
          pip install requests

      # 🎬 Run scraper
      - name: Run scraper
        run: |
          cd nepal
          SCRIPT="${{ matrix.scraper }}.py"

          echo "🎬 Running $SCRIPT"

          for i in {1..6}; do
            echo "Attempt $i"

            if python $SCRIPT; then
              echo "✅ $SCRIPT finished successfully"
              break
            fi

            echo "❌ $SCRIPT failed. Retrying in 10 seconds..."
            sleep 10
          done

      # 💾 Commit & Push
      - name: Commit scraper data
        run: |
          cd nepal
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/

          git commit -m "${{ matrix.scraper }} update ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))" || echo "No changes"

          sleep $((RANDOM % 10))

          for i in {1..5}; do
            echo "Push attempt $i"

            git pull --rebase origin main || true

            if git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ env.REPO }}.git; then
              echo "✅ Push succeeded"
              break
            fi

            echo "❌ Push failed. Retrying in 5 seconds..."
            sleep 5
          done
